# Render Blueprint — https://render.com/docs/blueprint-spec
# Create/update services from this file, or mirror these values in the Render dashboard.
#
# After deploy: copy the web service URL into Vercel env NEXT_PUBLIC_BACKEND_URL and
# set CORS_ALLOWED_ORIGINS / ALLOWED_HOSTS on the API to your Vercel URL.

databases:
  - name: granadilla-db
    plan: free
    databaseName: granadilla
    user: granadilla

services:
  - type: web
    name: granadilla-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: granadilla-db
          property: connectionString
      # Set these after you have your Vercel URL (comma-separated if multiple):
      # - key: ALLOWED_HOSTS
      #   value: granadilla-api.onrender.com
      # - key: CORS_ALLOWED_ORIGINS
      #   value: https://your-app.vercel.app
      # - key: CSRF_TRUSTED_ORIGINS
      #   value: https://granadilla-api.onrender.com
      # Optional:
      # - key: RECAPTCHA_SECRET_KEY
      #   sync: false
      # - key: DEMO_SESSION_MINUTES
      #   value: "20"
